<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perceive — CVD Simulation Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div style="display:flex;align-items:baseline">
            <h1>Perceive</h1>
            <span class="subtitle">Color Vision Deficiency Simulator</span>
        </div>
        <button id="theme-toggle">Light / Dark</button>
    </header>

    <main>
        <div class="controls">
            <label for="severity-slider">Severity</label>
            <input type="range" id="severity-slider" min="0" max="100" value="100" step="1">
            <span class="severity-value" id="severity-display">1.00</span>

            <label for="model-select">Model</label>
            <select id="model-select">
                <option value="brettel" selected>Brettel 1997 (accurate)</option>
                <option value="vienot">Vienot 1999 (fast)</option>
            </select>
        </div>

        <div class="drop-zone" id="drop-zone">
            <p>Drop an image here, or click to select</p>
            <p class="hint">PNG, JPEG, WebP — processed entirely in your browser via WASM</p>
        </div>
        <input type="file" id="file-input" accept="image/*">

        <div class="loading" id="loading">Processing...</div>

        <div class="image-grid" id="image-grid"></div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
