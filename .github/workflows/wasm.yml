name: WASM

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'bindings/wasm/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'bindings/wasm/**'

jobs:
  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build bindings/wasm --target web
