name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build bindings/wasm --target web --out-dir pkg

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp demo/index.html demo/style.css demo/app.js _site/
          cp bindings/wasm/pkg/perceive_wasm.js _site/pkg/
          cp bindings/wasm/pkg/perceive_wasm_bg.wasm _site/pkg/
          cp bindings/wasm/pkg/perceive_wasm.d.ts _site/pkg/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
